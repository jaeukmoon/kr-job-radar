name: Daily job fetch

on:
  schedule:
    - cron: "0 0 * * *"   # 09:00 KST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright (for Samsung/Hyundai/SK)
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      # Browser sources sit behind bot-protection (SK WAF, Hyundai NetFunnel queue,
      # Samsung SPA). continue-on-error so a block never fails the whole run — the
      # static feed below still updates, and jobs_browser.json keeps its last-good data.
      - name: Fetch browser sources (Samsung/Hyundai/SK)
        continue-on-error: true
        run: python fetch_browser.py

      - name: Fetch static sources + merge browser sources
        run: python fetch_jobs.py

      # Mine each posting's minimum/preferred qualifications (자격요건/우대사항) over
      # plain HTTP and tag domain/skill keywords onto jobs.json. Cached by job id in
      # data/quals_cache.json so only newly-seen postings are fetched each day.
      - name: Enrich with JD skill/domain keywords
        run: python fetch_details.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "data: daily fetch $(date -u +%Y-%m-%d)"
          git push
